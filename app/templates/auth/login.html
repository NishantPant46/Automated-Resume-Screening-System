{% extends "base.html" %}

{% block title %}
Login | ResumeAI
{% endblock %}

{% block content %}

<div class="login-page">

    <div class="login-card">

        <div class="text-center mb-4">

            <div class="login-logo">
                <i class="bi bi-robot"></i>
            </div>

            <h2>Welcome Back</h2>

            <p>
                Sign in to your ResumeAI dashboard
            </p>

        </div>


        <form method="POST"
              id="loginForm">

            <div class="mb-3">

                <label class="form-label">
                    Email Address
                </label>

                <input
                    type="email"
                    name="email"
                    class="form-control"
                    placeholder="recruiter@example.com"
                    required>

            </div>


            <div class="mb-3">

                <label class="form-label">
                    Password
                </label>

                <input
                    type="password"
                    name="password"
                    class="form-control"
                    required>

            </div>


            <div class="d-flex justify-content-between mb-4">

                <div class="form-check">

                    <input
                        class="form-check-input"
                        type="checkbox">

                    <label class="form-check-label">
                        Remember me
                    </label>

                </div>


                <a href="#">
                    Forgot Password?
                </a>

            </div>


            <button
                type="submit"
                class="btn btn-primary w-100">

                Sign In

            </button>

        </form>

    </div>

</div>

{% endblock %}
