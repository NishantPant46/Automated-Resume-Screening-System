{% extends "base.html" %}

{% block title %}
Create Job | ResumeAI
{% endblock %}

{% block content %}

<div class="page-header">

    <div>

        <h2>Create New Job</h2>

        <p>
            Create a job position and define the
            requirements for AI screening.
        </p>

    </div>

</div>


<div class="dashboard-card">

<form method="POST"
      enctype="multipart/form-data"
      id="jobForm">


    <div class="row g-4">


        <div class="col-md-6">

            <label class="form-label">
                Job Title *
            </label>

            <input
                type="text"
                name="job_title"
                class="form-control"
                placeholder="Software Engineer"
                required>

        </div>


        <div class="col-md-6">

            <label class="form-label">
                Department
            </label>

            <input
                type="text"
                name="department"
                class="form-control"
                placeholder="Engineering">

        </div>


        <div class="col-md-6">

            <label class="form-label">
                Location
            </label>

            <input
                type="text"
                name="location"
                class="form-control"
                placeholder="Kathmandu / Remote">

        </div>


        <div class="col-md-6">

            <label class="form-label">
                Experience Required
            </label>

            <select
                name="experience"
                class="form-select">

                <option>Entry Level</option>

                <option>1-2 Years</option>

                <option>3-5 Years</option>

                <option>5+ Years</option>

            </select>

        </div>


        <div class="col-12">

            <label class="form-label">
                Required Skills
            </label>

            <input
                type="text"
                name="skills"
                class="form-control"
                placeholder="Python, Flask, SQL, NLP, Machine Learning">

        </div>


        <div class="col-12">

            <label class="form-label">
                Job Description *
            </label>

            <textarea
                name="description"
                class="form-control"
                rows="8"
                required></textarea>

        </div>


        <div class="col-12">

            <label class="form-label">
                Or Upload Job Description
            </label>

            <input
                type="file"
                name="job_file"
                class="form-control"
                accept=".txt,.pdf,.doc,.docx">

        </div>


    </div>


    <div class="mt-4">

        <button
            type="submit"
            class="btn btn-primary">

            <i class="bi bi-check-lg"></i>

            Create Job

        </button>

    </div>


</form>

</div>

{% endblock %}
