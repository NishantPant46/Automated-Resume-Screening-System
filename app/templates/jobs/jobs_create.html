{% extends "base.html" %}

{% block content %}

<h2>Create Job</h2>

<form method="POST">

    <input
        type="text"
        name="title"
        placeholder="Job Title"
        class="form-control mb-3"
        required>

    <input
        type="text"
        name="company"
        placeholder="Company"
        class="form-control mb-3"
        required>

    <textarea
        name="description"
        class="form-control mb-3"
        placeholder="Job Description"></textarea>

    <textarea
        name="skills"
        class="form-control mb-3"
        placeholder="Required Skills"></textarea>

    <input
        type="number"
        name="experience"
        class="form-control mb-3"
        placeholder="Experience (Years)">

    <button
        class="btn btn-primary">

        Save Job

    </button>

</form>

{% endblock %}
